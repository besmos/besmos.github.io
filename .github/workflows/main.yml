name: Update Reddit Data
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Reddit RSS
        run: |
          # We use a standard browser User-Agent to stay under the radar
          curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          -L "https://www.reddit.com/r/YOUR_SUBREDDIT/top/.rss?t=day" \
          -o reddit-data.xml

      - name: Commit and Push to Data Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and switch to a 'data' branch if it doesn't exist
          git checkout -B data
          git add reddit-data.json
          git commit -m "update: reddit data $(date)"
          # Push specifically to the data branch
          git push origin data --force
