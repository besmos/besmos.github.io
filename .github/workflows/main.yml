name: Update Reddit Data
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Reddit RSS
        run: |
          # We use a standard browser User-Agent to stay under the radar
          curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          -L "https://www.reddit.com/r/YOUR_SUBREDDIT/top/.rss?t=day" \
          -o reddit-data.xml

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reddit-data.json
          # Use --amend to keep overwriting the last 'bot' commit
          git commit --amend -m "chore: update reddit data [skip ci]" || git commit -m "chore: update reddit data [skip ci]"
          git push --force
